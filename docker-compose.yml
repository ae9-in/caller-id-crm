version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: callcrm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: callcrm
      POSTGRES_PASSWORD: callcrm_secret
      POSTGRES_DB: callcrm_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./server/database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U callcrm -d callcrm_db']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: callcrm_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@callcrm.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data:
